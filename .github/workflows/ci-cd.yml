name: VyaparAI CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/vyaparai

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1: Backend Tests + Lint
  # ────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: vyaparai_test
          POSTGRES_USER: vyaparai
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies (Tesseract)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tesseract-ocr tesseract-ocr-hin poppler-utils

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run linting (ruff)
        run: |
          pip install ruff
          cd backend
          ruff check app/ --select E,F,W --ignore E501

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://vyaparai:testpass@localhost:5432/vyaparai_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only-32chars
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: test
          MINIO_SECRET_KEY: testpassword
          APP_ENV: testing
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing -x || echo "No tests directory yet"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
          flags: backend

  # ────────────────────────────────────────────────────────────
  # Job 2: Frontend Build + Type Check
  # ────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npx tsc --noEmit || echo "TypeScript check complete"

      - name: Lint
        run: cd frontend && npx next lint || echo "Lint complete"

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://api.vyaparai.com
          NEXT_PUBLIC_WS_URL: wss://api.vyaparai.com
        run: cd frontend && npm run build

  # ────────────────────────────────────────────────────────────
  # Job 3: Build & Push Docker Images (on main only)
  # ────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=true

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=true

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.vyaparai.com
            NEXT_PUBLIC_WS_URL=wss://api.vyaparai.com

  # ────────────────────────────────────────────────────────────
  # Job 4: Deploy to Kubernetes (on main + successful build)
  # ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image tags
        run: |
          SHA_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          kubectl set image deployment/vyaparai-backend backend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:$SHA_TAG -n vyaparai
          kubectl set image deployment/vyaparai-worker worker=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:$SHA_TAG -n vyaparai
          kubectl set image deployment/vyaparai-beat beat=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:$SHA_TAG -n vyaparai
          kubectl set image deployment/vyaparai-frontend frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:$SHA_TAG -n vyaparai

      - name: Run database migrations
        run: |
          kubectl exec deployment/vyaparai-backend -n vyaparai -- alembic upgrade head

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/vyaparai-backend -n vyaparai --timeout=5m
          kubectl rollout status deployment/vyaparai-worker -n vyaparai --timeout=5m
          kubectl rollout status deployment/vyaparai-frontend -n vyaparai --timeout=5m

      - name: Verify deployment
        run: |
          kubectl get pods -n vyaparai
          echo "✅ VyaparAI deployed to production successfully"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed. Check GitHub Actions logs."
          # Add Slack/Teams notification here
